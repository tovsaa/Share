<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>P2P File Share</title>
<style>
  :root {
    --bg: #0f1117; --card: #181b25; --sunken: #0f1220; --border: #262a38;
    --text: #e8ebf2; --muted: #8b90a3; --muted-2: #565a6c;
    --accent: #6366f1; --accent-hover: #7c7ff5;
    --ok: #22c55e; --err: #ef4444; --warn: #f59e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; padding: 20px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    display: flex; align-items: flex-start; justify-content: center;
  }
  main {
    width: 100%; max-width: 560px; margin-top: 40px;
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 22px;
  }
  h1 { margin: 0 0 14px; font-size: 20px; font-weight: 600; }

  .status {
    font-size: 13px; color: var(--muted); padding: 10px 14px;
    background: var(--sunken); border-radius: 10px; margin-bottom: 10px;
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .status::before {
    content: ""; width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); flex-shrink: 0;
  }
  .status.ok::before { background: var(--ok); }
  .status.err::before { background: var(--err); }
  .status.warn::before { background: var(--warn); }
  .status-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .me {
    font-size: 13px; color: var(--muted); padding: 10px 14px;
    background: var(--sunken); border-radius: 10px; margin-bottom: 14px;
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .me-label { color: var(--muted-2); }
  .me-id {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--text); font-weight: 500; letter-spacing: 1px;
    flex: 1;
  }
  .me-copy {
    background: none; border: 1px solid var(--border); color: var(--muted);
    padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
  }
  .me-copy:hover { color: var(--text); border-color: var(--accent); }
  .me-copy.copied { color: var(--ok); border-color: var(--ok); }

  .section-title {
    font-size: 11px; color: var(--muted-2); text-transform: uppercase; letter-spacing: 1px;
    margin: 16px 2px 8px; display: flex; justify-content: space-between; align-items: baseline;
  }
  .section-title .count { font-size: 11px; color: var(--muted-2); }

  .peers { display: flex; flex-direction: column; gap: 6px; }
  .peers-empty {
    padding: 14px; text-align: center;
    font-size: 12px; color: var(--muted-2);
    border: 1px dashed var(--border); border-radius: 10px;
  }
  .peer {
    padding: 10px 13px; background: var(--sunken); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    transition: border-color 0.15s, background 0.15s;
  }
  .peer:hover:not(.connecting) { border-color: var(--accent); }
  .peer .dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--muted-2); flex-shrink: 0;
  }
  .peer[data-state="connecting"] .dot,
  .peer[data-state="negotiating"] .dot { background: var(--warn); animation: pulse 1.2s ease-in-out infinite; }
  .peer[data-state="connected"] .dot { background: var(--ok); }
  .peer[data-state="failed"] .dot { background: var(--err); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .peer .pid {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px; letter-spacing: 1px; flex: 1;
  }
  .peer .pmeta { font-size: 11px; color: var(--muted); }
  .peer .pclose {
    background: none; border: none; color: var(--muted-2); font-size: 16px;
    cursor: pointer; padding: 0 4px; line-height: 1; display: none;
  }
  .peer[data-state="connected"] .pclose,
  .peer[data-state="connecting"] .pclose,
  .peer[data-state="negotiating"] .pclose,
  .peer[data-state="failed"] .pclose { display: block; }
  .peer .pclose:hover { color: var(--err); }

  label.drop {
    display: block; padding: 22px 20px; border: 2px dashed var(--border);
    border-radius: 12px; text-align: center; cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-top: 8px;
  }
  label.drop:hover:not(.disabled), label.drop.drag { border-color: var(--accent); background: var(--sunken); }
  label.drop.disabled { opacity: 0.4; cursor: not-allowed; }
  label.drop input { display: none; }
  .drop-title { font-size: 14px; color: var(--text); }
  .drop-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
  .drop-target { color: var(--accent); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  .queue { margin-top: 10px; display: flex; flex-direction: column; gap: 8px; }
  .queue:empty { display: none; }
  .item {
    padding: 11px 13px; background: var(--sunken); border: 1px solid var(--border);
    border-radius: 10px; transition: border-color 0.15s;
  }
  .item.downloadable { cursor: pointer; }
  .item.downloadable:hover { border-color: var(--accent); }
  .item-head {
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 8px; font-size: 13px; margin-bottom: 6px;
  }
  .item-name {
    color: var(--text); font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
  }
  .item-dir { color: var(--muted); margin-right: 6px; }
  .item-peer {
    color: var(--muted-2); font-size: 11px; margin-left: 6px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .item-state { color: var(--muted); font-size: 12px; white-space: nowrap; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .item-progress { height: 3px; background: var(--border); border-radius: 100px; overflow: hidden; }
  .item-bar {
    height: 100%; width: 0%; background: var(--accent);
    transition: width 0.15s linear;
  }
  .item[data-state="ack"] .item-state,
  .item[data-state="received"] .item-state { color: var(--ok); }
  .item[data-state="ack"] .item-bar,
  .item[data-state="received"] .item-bar { background: var(--ok); }
  .item[data-state="error"] .item-state { color: var(--err); }
  .item[data-state="error"] .item-bar { background: var(--err); }

  [hidden] { display: none !important; }

  .footer {
    margin-top: 18px; text-align: center;
    font-size: 11px; color: var(--muted-2); opacity: 0.7;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>
<main>
  <div class="status" id="status"><span class="status-text">Подключаюсь к серверу…</span></div>

  <div class="me" hidden id="me">
    <span class="me-label">Ваш ID</span>
    <span class="me-id" id="me-id">—</span>
    <button class="me-copy" id="me-copy" type="button">Копировать</button>
  </div>

  <div class="section-title">
    <span>Онлайн</span>
    <span class="count" id="peers-count">0</span>
  </div>
  <div class="peers" id="peers"></div>
  <div class="peers-empty" id="peers-empty">Никого больше нет. Откройте страницу ещё раз на другом устройстве.</div>

  <label class="drop disabled" id="drop">
    <input type="file" id="file-input" multiple disabled>
    <div class="drop-title">+ Добавить файлы</div>
    <div class="drop-sub" id="drop-sub">Сначала выберите онлайн-пира</div>
  </label>

  <div class="queue" id="queue"></div>

  <div class="footer">WebRTC · direct P2P · files never touch the server</div>
</main>

<script>
(() => {
  'use strict';

  // ─────────────────────────────── КОНФИГ ───────────────────────────────

  // ⚠️ ЗАМЕНИТЕ на URL своего сигнального сервера на Render
  // (на Render это будет что-то вроде wss://your-service.onrender.com).
  const SIGNAL_URL =
    (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? 'ws://localhost:10000'
      : 'wss://shareserver-ft37.onrender.com';

  // STUN — без них NAT traversal не работает. TURN добавьте при необходимости
  // (на быстрых соединениях TURN режет скорость, но это единственный путь
  // через симметричный NAT).
  const ICE_SERVERS = [
    { urls: ['stun:stun.l.google.com:19302', 'stun:stun1.l.google.com:19302'] },
    // Пример TURN (раскомментируйте и вставьте свои креды):
    // { urls: 'turn:your-turn.example.com:3478', username: 'user', credential: 'pass' },
  ];

  // Настройки передачи — подобраны под максимальную скорость.
  const DATA_CHANNELS_PER_PEER = 3;         // параллельных data-каналов
  const DESIRED_CHUNK   = 256 * 1024;       // целевой размер чанка
  const FALLBACK_CHUNK  = 64  * 1024;       // если браузер не отдаёт maxMessageSize
  const BUFFER_HIGH     = 8   * 1024 * 1024;// при превышении — ждём bufferedamountlow
  const BUFFER_LOW      = 1   * 1024 * 1024;// порог «низкого уровня» буфера
  const PROG_INTERVAL   = 250;              // мс между progress-уведомлениями по сети
  const SPEED_WINDOW_MS = 2000;             // окно сглаживания для расчёта скорости
  const RECONNECT_BASE  = 1000;
  const RECONNECT_MAX   = 15000;

  // ───────────────────────────── УТИЛИТЫ ──────────────────────────────

  const $ = (id) => document.getElementById(id);
  const fmt = (b) => {
    if (!isFinite(b) || b < 0) return '0 B';
    if (b < 1024) return b.toFixed(0) + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    if (b < 1073741824) return (b / 1048576).toFixed(1) + ' MB';
    return (b / 1073741824).toFixed(2) + ' GB';
  };
  const setStatus = (text, kind) => {
    const el = $('status');
    el.className = 'status' + (kind ? ' ' + kind : '');
    el.querySelector('.status-text').textContent = text;
  };
  const uid = () => Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

  // ───────────────────────── СИГНАЛЬНЫЙ КАНАЛ ─────────────────────────

  let ws = null;
  let myId = null;
  let reconnectAttempt = 0;
  let reconnectTimer = null;

  function connectSignal() {
    clearTimeout(reconnectTimer);
    setStatus('Подключаюсь к серверу…');
    try {
      ws = new WebSocket(SIGNAL_URL);
    } catch (err) {
      scheduleReconnect();
      return;
    }

    ws.addEventListener('open', () => {
      reconnectAttempt = 0;
      setStatus('Подключен. Ожидаю ID…');
    });

    ws.addEventListener('message', (ev) => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch { return; }
      if (!msg || typeof msg !== 'object') return;

      if (msg.t === 'welcome') {
        myId = msg.id;
        $('me-id').textContent = myId;
        $('me').hidden = false;
        setStatus('Онлайн · готов к соединениям', 'ok');
      } else if (msg.t === 'peers') {
        renderPeerList(msg.peers || []);
      } else if (msg.t === 'signal') {
        handleSignal(msg.from, msg.payload);
      } else if (msg.t === 'peer-gone') {
        const sess = sessions.get(msg.id);
        if (sess) teardownSession(msg.id, 'пир ушёл');
      }
    });

    ws.addEventListener('close', () => {
      setStatus('Сервер недоступен. Переподключаюсь…', 'warn');
      myId = null;
      $('me').hidden = true;
      renderPeerList([]);
      // существующие WebRTC-сессии не трогаем — они работают независимо
      scheduleReconnect();
    });

    ws.addEventListener('error', () => {
      try { ws.close(); } catch {}
    });
  }

  function scheduleReconnect() {
    reconnectAttempt++;
    const delay = Math.min(RECONNECT_MAX, RECONNECT_BASE * Math.pow(1.7, reconnectAttempt - 1));
    reconnectTimer = setTimeout(connectSignal, delay);
  }

  function signalSend(to, payload) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return false;
    ws.send(JSON.stringify({ t: 'signal', to, payload }));
    return true;
  }

  // ───────────────────────── СПИСОК ПИРОВ ────────────────────────────

  let knownPeers = [];

  function renderPeerList(peers) {
    knownPeers = peers;
    $('peers-count').textContent = peers.length;
    $('peers-empty').hidden = peers.length > 0;

    const host = $('peers');
    const existing = new Map();
    host.querySelectorAll('.peer').forEach((el) => existing.set(el.dataset.pid, el));

    // удаляем ушедших (если не в активной сессии)
    for (const [pid, el] of existing) {
      if (!peers.includes(pid) && !sessions.has(pid)) el.remove();
    }

    // добавляем новых в списке, сохраняя сессии сверху
    const ordered = [
      ...peers.filter((p) => sessions.has(p)),
      ...peers.filter((p) => !sessions.has(p)),
    ];
    host.innerHTML = '';
    for (const pid of ordered) {
      host.appendChild(makePeerEl(pid));
    }
    // также показываем сессии, пира которых сервер уже не видит (ещё не получил close)
    for (const pid of sessions.keys()) {
      if (!peers.includes(pid)) host.appendChild(makePeerEl(pid));
    }
    refreshPeerStates();
  }

  function makePeerEl(pid) {
    const el = document.createElement('div');
    el.className = 'peer';
    el.dataset.pid = pid;
    el.innerHTML = `
      <span class="dot"></span>
      <span class="pid"></span>
      <span class="pmeta"></span>
      <button class="pclose" type="button" title="Закрыть соединение">×</button>
    `;
    el.querySelector('.pid').textContent = pid;
    el.addEventListener('click', (e) => {
      if (e.target.classList.contains('pclose')) {
        teardownSession(pid, 'закрыто пользователем');
        refreshPeerStates();
        return;
      }
      const sess = sessions.get(pid);
      if (!sess) {
        initiateSession(pid);
      } else if (sess.state === 'connected') {
        setSelected(pid);
      }
    });
    return el;
  }

  function refreshPeerStates() {
    document.querySelectorAll('.peer').forEach((el) => {
      const pid = el.dataset.pid;
      const sess = sessions.get(pid);
      const state = sess ? sess.state : 'idle';
      el.dataset.state = state;
      const meta = el.querySelector('.pmeta');
      if (state === 'idle') meta.textContent = '';
      else if (state === 'connecting') meta.textContent = 'установка…';
      else if (state === 'negotiating') meta.textContent = 'согласование…';
      else if (state === 'connected') {
        const bits = [];
        if (sess.via) bits.push(sess.via);
        if (pid === selectedPeer) bits.push('выбран');
        meta.textContent = bits.join(' · ');
      } else if (state === 'failed') meta.textContent = 'ошибка';
    });
    updateDropZone();
  }

  // ─────────────────── WEBRTC-СЕССИИ С КАЖДЫМ ПИРОМ ──────────────────

  /**
   * Session = { pc, state, dataChannels[], controlChannel, ... }
   *
   * Каждый пир использует 1 control-канал (JSON) + N data-каналов
   * (бинарь + лёгкие JSON meta/end/abort для этого канала).
   * Один файл привязывается к ровно одному data-каналу на всё время
   * своей передачи — это даёт параллельность без мультиплексирования.
   */
  const sessions = new Map(); // peerId -> Session
  let selectedPeer = null;

  function createSession(peerId, isInitiator) {
    const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });
    const sess = {
      peerId, pc,
      state: 'connecting',
      polite: myId < peerId,          // politeness правило (детерминированно)
      makingOffer: false,
      ignoreOffer: false,
      controlChannel: null,
      dataChannels: [],               // [{ch, busy:boolean}]
      via: '',                        // p2p / relay
      // отправляющая сторона:
      pendingSends: [],               // items в состоянии queued
      activeOutByChannel: new Map(),  // channelIdx -> sendItem
      // принимающая сторона:
      activeInByChannel: new Map(),   // channelIdx -> receiveItem
    };
    sessions.set(peerId, sess);

    pc.onicecandidate = ({ candidate }) => {
      if (candidate) signalSend(peerId, { type: 'ice', candidate });
      else signalSend(peerId, { type: 'ice', candidate: null }); // end-of-candidates
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === 'connected') {
        sess.state = 'connected';
        detectTransport(sess);
        if (!selectedPeer) setSelected(peerId);
        refreshPeerStates();
      } else if (pc.connectionState === 'failed') {
        sess.state = 'failed';
        teardownSession(peerId, 'соединение разорвано');
      } else if (pc.connectionState === 'disconnected') {
        // Chrome иногда возвращается из disconnected — не рвём сразу.
      } else if (pc.connectionState === 'closed') {
        // teardown уже был
      }
    };

    pc.onnegotiationneeded = async () => {
      try {
        sess.makingOffer = true;
        await pc.setLocalDescription();
        signalSend(peerId, { type: 'sdp', sdp: pc.localDescription });
      } catch (err) {
        console.error('negotiation error', err);
      } finally {
        sess.makingOffer = false;
      }
    };

    pc.ondatachannel = (ev) => {
      attachIncomingChannel(sess, ev.channel);
    };

    return sess;
  }

  function initiateSession(peerId) {
    if (sessions.has(peerId)) return;
    const sess = createSession(peerId, true);

    // Инициатор создаёт все каналы заранее — это триггерит negotiationneeded.
    // Все каналы ordered+reliable (для файлов это нужно).
    const ctrl = sess.pc.createDataChannel('ctrl', { ordered: true });
    ctrl.binaryType = 'arraybuffer';
    wireControlChannel(sess, ctrl);

    for (let i = 0; i < DATA_CHANNELS_PER_PEER; i++) {
      const dc = sess.pc.createDataChannel('d' + i, { ordered: true, id: undefined });
      dc.binaryType = 'arraybuffer';
      wireDataChannel(sess, dc, i);
    }

    refreshPeerStates();
  }

  function attachIncomingChannel(sess, ch) {
    ch.binaryType = 'arraybuffer';
    if (ch.label === 'ctrl') {
      wireControlChannel(sess, ch);
    } else if (/^d\d+$/.test(ch.label)) {
      const idx = parseInt(ch.label.slice(1), 10);
      wireDataChannel(sess, ch, idx);
    }
  }

  function wireControlChannel(sess, ch) {
    sess.controlChannel = ch;
    ch.bufferedAmountLowThreshold = BUFFER_LOW;
    ch.onopen = () => { /* ничего особенного */ };
    ch.onmessage = (ev) => {
      if (typeof ev.data !== 'string') return;
      let msg; try { msg = JSON.parse(ev.data); } catch { return; }
      handleControlMessage(sess, msg);
    };
    ch.onclose = () => {
      // если это был последний активный канал — рвём сессию
    };
  }

  function wireDataChannel(sess, ch, idx) {
    ch.bufferedAmountLowThreshold = BUFFER_LOW;
    sess.dataChannels[idx] = { ch, busy: false };
    ch.onopen = () => {
      // определяем фактический chunk size по sctp.maxMessageSize один раз
      if (!sess.chunkSize) {
        const m = sess.pc.sctp && sess.pc.sctp.maxMessageSize;
        sess.chunkSize = (m && isFinite(m) && m >= 1024)
          ? Math.min(DESIRED_CHUNK, Math.floor(m))
          : FALLBACK_CHUNK;
      }
      pumpSends(sess);
    };
    ch.onmessage = (ev) => {
      if (typeof ev.data === 'string') {
        let msg; try { msg = JSON.parse(ev.data); } catch { return; }
        handleDataChannelMessage(sess, idx, msg);
      } else {
        // бинарные данные — chunk активного входящего файла на этом канале
        const item = sess.activeInByChannel.get(idx);
        if (!item) return;
        item.chunks.push(ev.data);
        bumpProgress(item, item.transferred + ev.data.byteLength);
        scheduleRender(item);
        throttleSendProgress(sess, item);
      }
    };
    ch.onclose = () => {
      sess.dataChannels[idx].busy = false;
    };
  }

  async function handleSignal(from, payload) {
    let sess = sessions.get(from);
    if (!sess) {
      // incoming offer от нового пира — создаём сессию
      if (payload && payload.type === 'sdp' && payload.sdp && payload.sdp.type === 'offer') {
        sess = createSession(from, false);
      } else {
        return;
      }
    }
    const pc = sess.pc;
    try {
      if (payload.type === 'sdp') {
        const desc = payload.sdp;
        const offerCollision =
          desc.type === 'offer' && (sess.makingOffer || pc.signalingState !== 'stable');
        sess.ignoreOffer = !sess.polite && offerCollision;
        if (sess.ignoreOffer) return;
        // Во время коллизии setRemoteDescription делает implicit rollback (W3C).
        await pc.setRemoteDescription(desc);
        if (desc.type === 'offer') {
          sess.state = 'negotiating';
          refreshPeerStates();
          await pc.setLocalDescription();
          signalSend(from, { type: 'sdp', sdp: pc.localDescription });
        }
      } else if (payload.type === 'ice') {
        try {
          await pc.addIceCandidate(payload.candidate || undefined);
        } catch (err) {
          if (!sess.ignoreOffer) console.warn('addIceCandidate', err);
        }
      }
    } catch (err) {
      console.error('signal handling error', err);
    }
  }

  async function detectTransport(sess) {
    try {
      const stats = await sess.pc.getStats();
      let pair = null;
      stats.forEach((r) => {
        if (r.type === 'candidate-pair' && r.state === 'succeeded' && (r.nominated || !pair)) pair = r;
      });
      if (!pair) return;
      let lt = '', rt = '';
      stats.forEach((c) => {
        if (c.id === pair.localCandidateId) lt = c.candidateType;
        if (c.id === pair.remoteCandidateId) rt = c.candidateType;
      });
      sess.via = (lt === 'relay' || rt === 'relay') ? 'через TURN' : 'прямое P2P';
      refreshPeerStates();
    } catch {}
  }

  function teardownSession(peerId, reason) {
    const sess = sessions.get(peerId);
    if (!sess) return;
    sessions.delete(peerId);
    // помечаем все активные передачи этого пира как ошибочные
    for (const item of queue.values()) {
      if (item.peerId === peerId && (item.state === 'sending' || item.state === 'receiving' || item.state === 'queued')) {
        item.state = 'error';
        item.error = reason || 'соединение закрыто';
        scheduleRender(item);
      }
    }
    try { sess.pc.close(); } catch {}
    if (selectedPeer === peerId) {
      // переключаемся на любое другое активное соединение
      const next = [...sessions.values()].find((s) => s.state === 'connected');
      selectedPeer = next ? next.peerId : null;
    }
    // если пира нет в онлайн-списке — уберём его карточку
    if (!knownPeers.includes(peerId)) {
      const el = document.querySelector(`.peer[data-pid="${CSS.escape(peerId)}"]`);
      if (el) el.remove();
    }
    refreshPeerStates();
  }

  function setSelected(peerId) {
    const sess = sessions.get(peerId);
    if (!sess || sess.state !== 'connected') return;
    selectedPeer = peerId;
    refreshPeerStates();
  }

  // ─────────────────────── ПРОТОКОЛ ПЕРЕДАЧИ ─────────────────────────

  // control канал — межфайловые сообщения (лёгкие, JSON):
  //   {k:'prog', id, r}   — получатель -> отправитель, byte-счётчик
  //   {k:'ack', id}       — получатель -> отправитель, файл полностью принят
  //   {k:'abort', id}     — любая сторона может отменить
  //
  // data канал (один канал обслуживает один файл последовательно):
  //   {k:'meta', id, name, size, mime}  — начало файла
  //   бинарные ArrayBuffer-ы                — чанки файла
  //   {k:'end', id}                         — конец файла (канал освобождается)

  function handleControlMessage(sess, msg) {
    if (!msg || !msg.k) return;
    if (msg.k === 'prog') {
      const item = queue.get(msg.id);
      if (!item) return;
      bumpProgress(item, msg.r);
      scheduleRender(item);
    } else if (msg.k === 'ack') {
      const item = queue.get(msg.id);
      if (!item) return;
      bumpProgress(item, item.size);
      item.state = 'ack';
      scheduleRender(item);
    } else if (msg.k === 'abort') {
      const item = queue.get(msg.id);
      if (!item) return;
      item.state = 'error';
      item.error = 'прервано собеседником';
      item.chunks = null;
      scheduleRender(item);
      // освобождаем канал, если он был назначен
      for (const [idx, it] of sess.activeInByChannel) {
        if (it.id === msg.id) sess.activeInByChannel.delete(idx);
      }
      for (const [idx, it] of sess.activeOutByChannel) {
        if (it.id === msg.id) {
          sess.activeOutByChannel.delete(idx);
          sess.dataChannels[idx].busy = false;
        }
      }
      pumpSends(sess);
    }
  }

  function handleDataChannelMessage(sess, idx, msg) {
    if (!msg || !msg.k) return;
    if (msg.k === 'meta') {
      const item = {
        id: msg.id, peerId: sess.peerId,
        dir: 'in', name: msg.name, size: msg.size,
        mime: msg.mime || 'application/octet-stream',
        state: 'receiving', transferred: 0, chunks: [],
        speedSamples: [], speedBps: 0,
        channelIdx: idx,
      };
      queue.set(item.id, item);
      sess.activeInByChannel.set(idx, item);
      scheduleRender(item);
    } else if (msg.k === 'end') {
      const item = sess.activeInByChannel.get(idx);
      if (!item || item.id !== msg.id) return;
      try {
        const blob = new Blob(item.chunks, { type: item.mime });
        item.blobUrl = URL.createObjectURL(blob);
        item.chunks = null;
        bumpProgress(item, item.size);
        item.state = 'received';
        scheduleRender(item);
        triggerDownload(item);
        safeControlSend(sess, { k: 'ack', id: item.id });
      } catch (err) {
        item.state = 'error'; item.error = err.message;
        scheduleRender(item);
        safeControlSend(sess, { k: 'abort', id: item.id });
      }
      sess.activeInByChannel.delete(idx);
    }
  }

  function safeControlSend(sess, obj) {
    const ch = sess.controlChannel;
    if (!ch || ch.readyState !== 'open') return false;
    try { ch.send(JSON.stringify(obj)); return true; } catch { return false; }
  }

  // ────────────────────────── ОЧЕРЕДЬ + SEND ─────────────────────────

  const queue = new Map(); // itemId -> item

  async function enqueueFiles(fileList) {
    if (!selectedPeer) {
      alert('Сначала выберите онлайн-пира (клик по ID в списке).');
      return;
    }
    const sess = sessions.get(selectedPeer);
    if (!sess || sess.state !== 'connected') {
      alert('Нет активного соединения с выбранным пиром.');
      return;
    }
    for (const f of fileList) {
      const item = {
        id: uid(), peerId: selectedPeer,
        dir: 'out', file: f, name: f.name, size: f.size,
        mime: f.type || 'application/octet-stream',
        state: 'queued', transferred: 0, localSent: 0,
        speedSamples: [], speedBps: 0,
        channelIdx: -1,
      };
      queue.set(item.id, item);
      sess.pendingSends.push(item);
      scheduleRender(item);
    }
    pumpSends(sess);
  }

  function pumpSends(sess) {
    if (!sess) return;
    while (sess.pendingSends.length > 0) {
      const freeIdx = sess.dataChannels.findIndex((d) => d && d.ch.readyState === 'open' && !d.busy);
      if (freeIdx < 0) return; // все каналы заняты — подождём
      const item = sess.pendingSends.shift();
      // могли отменить раньше
      if (!queue.has(item.id) || item.state === 'error') continue;
      sess.dataChannels[freeIdx].busy = true;
      sess.activeOutByChannel.set(freeIdx, item);
      item.channelIdx = freeIdx;
      sendItem(sess, freeIdx, item).catch((err) => {
        item.state = 'error'; item.error = err.message || String(err);
        scheduleRender(item);
        safeControlSend(sess, { k: 'abort', id: item.id });
      }).finally(() => {
        sess.dataChannels[freeIdx].busy = false;
        sess.activeOutByChannel.delete(freeIdx);
        // по завершении — подхватываем следующий
        pumpSends(sess);
      });
    }
  }

  /**
   * Ключевой цикл отправки одного файла. Всё внимание — к максимальной скорости:
   *  - чанк = sctp.maxMessageSize (обычно 256 КБ);
   *  - не переполняем send-буфер (ждём bufferedamountlow по событию);
   *  - читаем файл стримингом через File.slice().arrayBuffer().
   */
  async function sendItem(sess, chIdx, item) {
    const dc = sess.dataChannels[chIdx].ch;
    const CHUNK = sess.chunkSize || FALLBACK_CHUNK;

    item.state = 'sending';
    item.transferred = 0;
    item.localSent = 0;
    item.speedSamples = [];
    scheduleRender(item);

    // meta
    dc.send(JSON.stringify({ k: 'meta', id: item.id, name: item.name, size: item.size, mime: item.mime }));

    let offset = 0;
    const file = item.file;
    while (offset < item.size) {
      // backpressure
      if (dc.bufferedAmount > BUFFER_HIGH) {
        await waitBufferLow(dc);
      }
      if (dc.readyState !== 'open') throw new Error('канал закрылся');

      const end = Math.min(offset + CHUNK, item.size);
      const buf = await file.slice(offset, end).arrayBuffer();
      dc.send(buf);
      offset = end;
      item.localSent = offset;
      // локальная оценка скорости — по отправленным байтам (до ack)
      bumpProgress(item, offset);
      scheduleRender(item);
    }
    dc.send(JSON.stringify({ k: 'end', id: item.id }));
    // ждём ack (ack приходит на control channel и переведёт item в state 'ack')
  }

  function waitBufferLow(dc) {
    return new Promise((resolve, reject) => {
      // мог упасть ниже порога прямо сейчас — не подписываемся зря
      if (dc.readyState !== 'open') return reject(new Error('канал закрылся'));
      if (dc.bufferedAmount <= dc.bufferedAmountLowThreshold) return resolve();
      const cleanup = () => {
        dc.removeEventListener('bufferedamountlow', onLow);
        dc.removeEventListener('close', onClose);
        dc.removeEventListener('error', onErr);
      };
      const onLow = () => { cleanup(); resolve(); };
      const onClose = () => { cleanup(); reject(new Error('канал закрылся')); };
      const onErr = () => { cleanup(); reject(new Error('ошибка канала')); };
      dc.addEventListener('bufferedamountlow', onLow);
      dc.addEventListener('close', onClose);
      dc.addEventListener('error', onErr);
    });
  }

  function bumpProgress(item, newBytes) {
    item.transferred = newBytes;
    const now = performance.now();
    item.speedSamples.push([now, newBytes]);
    while (item.speedSamples.length > 1 && now - item.speedSamples[0][0] > SPEED_WINDOW_MS) {
      item.speedSamples.shift();
    }
    if (item.speedSamples.length >= 2) {
      const f = item.speedSamples[0];
      const l = item.speedSamples[item.speedSamples.length - 1];
      const dt = (l[0] - f[0]) / 1000;
      const db = l[1] - f[1];
      item.speedBps = dt > 0 ? Math.max(0, db / dt) : 0;
    }
  }

  function throttleSendProgress(sess, item) {
    const now = performance.now();
    if (!item.lastProgSent || now - item.lastProgSent > PROG_INTERVAL) {
      item.lastProgSent = now;
      safeControlSend(sess, { k: 'prog', id: item.id, r: item.transferred });
    }
  }

  function triggerDownload(item) {
    if (!item.blobUrl) return;
    const a = document.createElement('a');
    a.href = item.blobUrl;
    a.download = item.name;
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    a.remove();
  }

  // ────────────────────────────── РЕНДЕР ─────────────────────────────

  const pending = new Set();
  let rafScheduled = false;

  function scheduleRender(item) {
    pending.add(item.id);
    if (rafScheduled) return;
    rafScheduled = true;
    requestAnimationFrame(() => {
      rafScheduled = false;
      for (const id of pending) {
        const it = queue.get(id);
        if (it) actualRender(it);
      }
      pending.clear();
    });
  }

  function stateText(item) {
    const p = item.size ? Math.floor(item.transferred / item.size * 100) : 0;
    const sp = item.speedBps > 0 ? ` · ${fmt(item.speedBps)}/s` : '';
    switch (item.state) {
      case 'queued':    return 'в очереди';
      case 'sending':   return `отправка ${p}%${sp}`;
      case 'receiving': return `получение ${p}%${sp}`;
      case 'ack':       return '✓ принято';
      case 'received':  return '✓ получено';
      case 'error':     return 'ошибка: ' + (item.error || '');
      default:          return item.state;
    }
  }

  function actualRender(item) {
    let el = document.querySelector(`.item[data-id="${CSS.escape(item.id)}"]`);
    if (!el) {
      el = document.createElement('div');
      el.className = 'item';
      el.dataset.id = item.id;
      el.innerHTML = `
        <div class="item-head">
          <div class="item-name">
            <span class="item-dir"></span><span class="item-fn"></span>
            <span class="item-peer"></span>
          </div>
          <div class="item-state"></div>
        </div>
        <div class="item-progress"><div class="item-bar"></div></div>
      `;
      el.addEventListener('click', () => {
        const it = queue.get(item.id);
        if (it && (it.state === 'received' || it.state === 'ack') && it.blobUrl) triggerDownload(it);
      });
      $('queue').appendChild(el);
    }
    el.dataset.state = item.state;
    el.querySelector('.item-dir').textContent = item.dir === 'out' ? '↑ ' : '↓ ';
    el.querySelector('.item-fn').textContent = `${item.name} · ${fmt(item.size)}`;
    el.querySelector('.item-peer').textContent = item.dir === 'out' ? `→ ${item.peerId}` : `← ${item.peerId}`;
    el.querySelector('.item-state').textContent = stateText(item);

    const p = item.size ? (item.transferred / item.size) * 100 : 0;
    const barPct = (item.state === 'ack' || item.state === 'received') ? 100 : p;
    el.querySelector('.item-bar').style.width = barPct + '%';
    el.classList.toggle('downloadable', !!item.blobUrl && item.dir === 'in');
  }

  // ─────────────────────────── DROP/INPUT ────────────────────────────

  const dropEl = $('drop');
  const inputEl = $('file-input');

  function updateDropZone() {
    const sess = selectedPeer ? sessions.get(selectedPeer) : null;
    const ready = sess && sess.state === 'connected';
    inputEl.disabled = !ready;
    dropEl.classList.toggle('disabled', !ready);
    const sub = $('drop-sub');
    if (!sessions.size) sub.textContent = 'Сначала выберите онлайн-пира';
    else if (!ready) sub.textContent = 'Ждём установки соединения…';
    else sub.innerHTML = `или перетащите сюда · получатель <span class="drop-target">${selectedPeer}</span>`;
  }

  dropEl.addEventListener('dragover', (e) => {
    if (inputEl.disabled) return;
    e.preventDefault(); dropEl.classList.add('drag');
  });
  dropEl.addEventListener('dragleave', () => dropEl.classList.remove('drag'));
  dropEl.addEventListener('drop', (e) => {
    if (inputEl.disabled) return;
    e.preventDefault(); dropEl.classList.remove('drag');
    if (e.dataTransfer.files.length) enqueueFiles(e.dataTransfer.files);
  });
  inputEl.addEventListener('change', () => {
    if (inputEl.files.length) enqueueFiles(inputEl.files);
    inputEl.value = '';
  });

  // Copy-my-id
  $('me-copy').addEventListener('click', async () => {
    if (!myId) return;
    const btn = $('me-copy');
    try {
      await navigator.clipboard.writeText(myId);
      btn.textContent = 'Скопировано';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Копировать'; btn.classList.remove('copied'); }, 1500);
    } catch {
      btn.textContent = 'Ошибка';
      setTimeout(() => { btn.textContent = 'Копировать'; }, 1500);
    }
  });

  // старт
  connectSignal();
})();
</script>
</body>
</html>
